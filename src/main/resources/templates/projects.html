<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/projects.css}" rel="stylesheet" type="text/css">
    <title>Проекты - Web Portal</title>

    <style id="psd-theme-inline">
:root{--coral:#E27D60;--mint:#85DCB0;--sand:#E8A87C;--mauve:#C38D9E;--teal:#41B3A3;--ink:#25302F;--soft:#485452;--bg:#F4F2EE;--panel:#FFFFFF;--panel2:#FAF8F5;--border:#D9D6CF;--border2:#B9B4AA;--radius:8px;--shadow:0 6px 18px rgba(37,48,47,.08)}
*{box-sizing:border-box}html,body{background:var(--bg)!important;color:var(--ink)!important;background-image:none!important}body{font-family:"Segoe UI",Arial,sans-serif!important}body:before,body:after{display:none!important;content:none!important}.navbar{background:var(--ink)!important;background-image:none!important;color:#fff!important;border-bottom:4px solid var(--teal)!important;box-shadow:none!important}.nav-container{max-width:1280px!important}.logo{color:#fff!important;font-weight:700!important;letter-spacing:.02em}.logo:before{content:"";display:inline-block;width:12px;height:30px;background:var(--teal);margin-right:10px;vertical-align:middle}.nav-links a,.logout-btn{background:transparent!important;background-image:none!important;color:#fff!important;border:1px solid rgba(255,255,255,.22)!important;border-radius:4px!important;text-decoration:none!important}.nav-links a:hover,.logout-btn:hover{background:#354241!important;color:#fff!important}.container{max-width:1280px!important}.header,.project-header{border-bottom:1px solid var(--border)!important;padding-bottom:1rem!important}.page-title,.project-title,.section-title,.generate-title{color:var(--ink)!important;font-weight:700!important;letter-spacing:.01em}.text-muted,.project-description,.meta-value,.no-assignments,.empty-state,.generate-description{color:var(--soft)!important}.project-info,.files-section,.assign-form,.add-file-form,.generate-section,.statistics-compact,.section-logs-block,.modal-content,.empty-state,.project-card,.section-card,.quick-actions,.stats-grid>*,.meta-item,.assigned-users{background:var(--panel)!important;background-image:none!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:var(--shadow)!important}.project-info,.files-section,.assign-form,.add-file-form,.generate-section,.statistics-compact,.section-logs-block{border-top:4px solid var(--teal)!important}.project-card,.section-card{position:relative;overflow:hidden;transition:border-color .15s ease,box-shadow .15s ease!important}.project-card:before,.section-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--teal)}.project-card:hover,.section-card:hover{transform:none!important;border-color:var(--teal)!important;box-shadow:0 8px 22px rgba(37,48,47,.12)!important}.meta-item{box-shadow:none!important;background:var(--panel2)!important;border-left:4px solid var(--mint)!important}.meta-label{color:var(--ink)!important;font-weight:700!important;text-transform:uppercase;font-size:.76rem!important;letter-spacing:.04em}.btn,.btn-primary,.btn-success,.btn-action,.btn-generate,.btn-generate-modern,.btn-primary-modern,.btn-success-modern,button[type="submit"]:not(.logout-btn){background:var(--teal)!important;background-image:none!important;color:#fff!important;border:1px solid #2F8F80!important;border-radius:4px!important;box-shadow:none!important;font-weight:600!important;text-decoration:none!important}.btn:hover,.btn-primary:hover,.btn-success:hover,.btn-action:hover,.btn-generate:hover,.btn-generate-modern:hover,.btn-primary-modern:hover,.btn-success-modern:hover,button[type="submit"]:not(.logout-btn):hover{background:#2F8F80!important;background-image:none!important;border-color:#28786C!important;transform:none!important;box-shadow:none!important}.btn-secondary,.btn-secondary-modern{background:#EFE8E4!important;background-image:none!important;color:var(--ink)!important;border:1px solid var(--border2)!important}.btn-secondary:hover,.btn-secondary-modern:hover{background:#E3DAD5!important;color:var(--ink)!important}.btn-delete,.btn-danger,.btn-process,span.btn[onclick*="delete"],button[onclick*="Удалить"],button[onclick*="delete"]{background:var(--coral)!important;background-image:none!important;color:#fff!important;border-color:#C7664F!important}.form-control,.form-control-sm,.status-select,input,select,textarea{background:#fff!important;color:var(--ink)!important;border:1px solid var(--border2)!important;border-radius:4px!important;box-shadow:none!important}.form-control:focus,.form-control-sm:focus,.status-select:focus,input:focus,select:focus,textarea:focus{outline:2px solid rgba(65,179,163,.25)!important;border-color:var(--teal)!important}.badge,.section-badge,.assignment-count,.log-count,.badge-active,.status-generated,.status-ready,.status-ready-badge{background:var(--teal)!important;background-image:none!important;color:#fff!important;border:1px solid #2F8F80!important;border-radius:4px!important}.bg-primary{background:var(--mauve)!important;color:#fff!important}.status-not-generated,.status-cancelled,.status-cancelled-badge{background:var(--coral)!important;background-image:none!important;color:#fff!important;border-color:#C7664F!important}.status-in-work,.status-in-work-badge{background:#F2E4D5!important;color:#6D4B20!important;border-color:var(--sand)!important}.files-table,.sticky-table{border-collapse:separate!important;border-spacing:0!important}.files-table th,.sticky-table thead th{background:var(--ink)!important;background-image:none!important;color:#fff!important;border-bottom:2px solid var(--teal)!important}.files-table td{background:#fff!important;border-bottom:1px solid var(--border)!important}.files-table tbody tr:hover td{background:#F6FBFA!important}.file-link,.project-title a{color:#277F74!important;font-weight:700!important;text-decoration:none!important}.file-link:hover,.project-title a:hover{color:var(--coral)!important;text-decoration:underline!important}.table-container{border:1px solid var(--border)!important;border-radius:var(--radius)!important;background:#fff!important}.alert-success,.toast-success{background:#E8F6F3!important;background-image:none!important;color:#1F5F56!important;border:1px solid var(--teal)!important}.alert-error,.toast-error{background:#F9E7E1!important;background-image:none!important;color:#8A3D2E!important;border:1px solid var(--coral)!important}.toast-message{border-radius:4px!important;box-shadow:0 8px 20px rgba(37,48,47,.16)!important}.lamp,.editor-badge{background:#fff!important;background-image:none!important;border:1px solid var(--border2)!important;border-radius:4px!important;color:var(--ink)!important}.lamp.ok .dot{background:var(--teal)!important}.lamp.warn .dot{background:var(--sand)!important}.lamp.err .dot{background:var(--coral)!important}.lamp.none .dot{background:#9CA3AF!important}.sync-pop,.editor-pop{background:#fff!important;background-image:none!important;border:1px solid var(--border2)!important;border-radius:var(--radius)!important;box-shadow:0 10px 28px rgba(37,48,47,.16)!important}.section-logs-block summary{background:var(--panel2)!important;background-image:none!important;color:var(--ink)!important}.section-log-row,.log-open,.log-save,.log-restore,.log-delete,.log-status,.log-close{background:#fff!important;background-image:none!important;border-left-color:var(--teal)!important}.log-delete{border-left-color:var(--coral)!important}.log-status{border-left-color:var(--sand)!important}.log-restore{border-left-color:var(--mauve)!important}.modal{background:rgba(37,48,47,.48)!important}.modal-header{border-bottom:1px solid var(--border)!important}@media(max-width:768px){.navbar{padding:.75rem 1rem!important}.nav-container,.nav-links,.header,.project-header{gap:.75rem!important}}
    </style>
</head>
<body>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        /*[[${successMessage}]]*/
        const successMessage = /*[[${successMessage}]]*/ null;
        /*[[${errorMessage}]]*/
        const errorMessage = /*[[${errorMessage}]]*/ null;

        if (successMessage) {
            // alert('✅ ' + successMessage);
        }

        if (errorMessage) {
            alert('❌ ' + errorMessage);
        }
    });
</script>
<!-- Navigation -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">Конструктор ПCД</div>
        <div class="nav-links">
            <!--            <a th:href="@{/projects}" class="btn-secondary">← Назад к проектам</a>-->
            <a th:href="@{/projects}">📋 Проекты</a>
            <a sec:authorize="hasAnyRole('ADMIN')" th:href="@{/admin}" >⚙ Панель администратора </a>
            <div class="user-info">
<!--                <span th:text="${user.name}">Пользователь</span>-->
<!--                <div class="user-avatar">-->
<!--                    <span>U</span>-->
<!--                </div>-->
                <form th:action="@{/logout}" method="post" style="display: inline;"
                      onsubmit="localStorage.removeItem('onlyoffice-editor-open');">
                    <button type="submit" class="logout-btn">Сбросить сеансы</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container">
    <!-- Header -->
    <div class="header">
        <div>
            <h1 class="page-title">📋 Мои проекты</h1>
            <p class="text-muted">Управление проектами и документами</p>
        </div>
        <button sec:authorize="hasAnyRole('GIP', 'ADMIN')" class="btn" onclick="openModal()">+ Создать проект</button>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
            <input class="action-btn" placeholder="🔍 Поиск проектов">

<!--        <a href="#" class="action-btn">-->
<!--            <span>📊</span>-->
<!--            Статистика-->
<!--        </a>-->
<!--        <a href="#" class="action-btn">-->
<!--            <span>🔄</span>-->
<!--            Синхронизировать-->
<!--        </a>-->
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid" style="display: none;" id="statsSection">
        <!-- Статистика будет здесь -->
    </div>
    <!-- Projects Grid -->
    <div th:if="${not #lists.isEmpty(projects)}" class="projects-grid">
        <a th:href="@{/projects/{id}/documents(id=${project.id})}"
           class="project-card"
           th:each="project : ${projects}">
            <div class="project-header">
                <h3 class="project-title" th:text="${project.name}">Название проекта</h3>
                <span class="badge badge-active">Активен</span>
            </div>
            <div>
                <span th:if="${project.general}" th:text="${project.general.name}" class="badge bg-primary"></span>
                <span th:unless="${project.general}" class="text-muted">Не выбран</span>
            </div>
            <p class="project-description" th:text="${project.description} ?: 'Описание отсутствует'">
                Описание проекта
            </p>

            <div class="project-stats">
                <div class="stat">
                    <span>📄</span>
                    <span th:text="${project.chapters.size()} + ' файлов'">5 файлов</span>
                </div>
                <div class="stat">
                    <span>👤</span>
                    <span th:text="${project.createdBy.name}">Автор</span>
                </div>
            </div>

            <div class="project-meta">
                <span th:text="${#temporals.format(project.createdAt, 'dd.MM.yyyy')}">Дата создания</span>
                <span>→ Открыть</span>
            </div>
        </a>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(projects)}" class="empty-state">
        <div class="mb-4">
            <span style="font-size: 4rem;">📁</span>
        </div>
        <h3 class="text-muted">Проектов пока нет</h3>
        <div sec:authorize="hasAnyRole('GIP', 'ADMIN')">
            <p class="text-muted mb-4">Создайте первый проект чтобы начать работу</p>
            <button class="btn" onclick="openModal()">Создать проект</button>
        </div>
    </div>
</div>

<!-- Create Project Modal -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Создание проекта</h3>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <form th:action="@{/projects}" method="post" th:object="${projectForm}">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" class="form-control" th:field="*{name}"
                           placeholder="Название проекта" required>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" th:field="*{description}"
                           placeholder="Описание проекта" required>
                </div>
                <div class="col-md-3">
                    <select class="form-control" th:field="*{generalId}">
                        <option value="">-- Выберите шаблон --</option>
                        <option th:each="general : ${generals}"
                                th:value="${general.id}"
                                th:text="${general.name}"></option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-success w-100">Добавить</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById('createModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('createModal').classList.remove('show');
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('createModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    // Показываем статистику если есть проекты
    document.addEventListener('DOMContentLoaded', function() {
        const projectsGrid = document.querySelector('.projects-grid');
        const statsSection = document.getElementById('statsSection');
        const emptyState = document.querySelector('.empty-state');

        if (projectsGrid && projectsGrid.children.length > 0) {
            statsSection.style.display = 'grid';
        }
    });
</script>
</body>
</html>
